name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install
      - run: npm run test
      - run: npm run build
      - name: Deploy production API
        run: echo "Configure Railway production deployment here."
      - name: Build mobile release
        run: echo "Configure EAS TestFlight and Play Internal release builds here."
